{% extends "dash_base.html" %}
{% block title %}Log Activity — Market Mosaic CRM{% endblock %}
{% block dash_content %}
<div class="dash-header"><h1 class="dash-title">Log Activity</h1></div>
<div class="dash-card" style="max-width:580px">
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>Activity Type *</label>
        <select name="type" required>
          {% for t in types %}<option>{{ t|title }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Contact</label>
        <select name="contact_id">
          <option value="">No contact</option>
          {% for c in contacts %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group"><label>Subject *</label><input type="text" name="subject" required placeholder="e.g. Discovery call with Priya"/></div>
    <div class="form-row">
      <div class="form-group"><label>Related Deal</label>
        <select name="deal_id">
          <option value="">No deal</option>
          {% for d in deals %}<option value="{{ d.id }}">{{ d.title }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Due Date</label><input type="date" name="due_date"/></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Key points, outcomes, next steps..."></textarea></div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;text-transform:none;letter-spacing:0;font-size:.9rem">
        <input type="checkbox" name="completed" style="width:auto"/> Mark as completed
      </label>
    </div>
    <div style="display:flex;gap:1rem;margin-top:.5rem">
      <button type="submit" class="btn btn-primary">Log Activity</button>
      <a href="{{ url_for('crm_activities') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
