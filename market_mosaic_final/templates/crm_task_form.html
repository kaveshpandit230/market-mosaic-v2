{% extends "dash_base.html" %}
{% block title %}New Task — Market Mosaic CRM{% endblock %}
{% block dash_content %}
<div class="dash-header"><h1 class="dash-title">New Task</h1></div>
<div class="dash-card" style="max-width:500px">
  <form method="POST">
    <div class="form-group"><label>Task Title *</label><input type="text" name="title" required placeholder="e.g. Send proposal to BrandCo"/></div>
    <div class="form-row">
      <div class="form-group"><label>Due Date</label><input type="date" name="due_date"/></div>
      <div class="form-group"><label>Priority</label>
        <select name="priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Related To</label><input type="text" name="related_to" placeholder="Contact name, deal, or campaign"/></div>
    <div style="display:flex;gap:1rem;margin-top:.5rem">
      <button type="submit" class="btn btn-primary">Add Task</button>
      <a href="{{ url_for('crm_tasks') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
