{% extends "dash_base.html" %}
{% block title %}Edit Campaign — Market Mosaic{% endblock %}
{% block dash_content %}
<div class="dash-header">
  <h1 class="dash-title">Edit Campaign</h1>
  <p class="dash-sub">Update campaign details and performance data.</p>
</div>
<div class="dash-card" style="max-width:640px">
  <form method="POST">
    <div class="form-group">
      <label>Campaign Name</label>
      <input type="text" name="name" value="{{ campaign.name }}" required/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Channel</label>
        <select name="channel" required>
          {% for ch in ['Social Media','Search','Email','LinkedIn','Display','Influencer','Other'] %}
          <option {% if campaign.channel==ch %}selected{% endif %}>{{ ch }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          {% for s in ['draft','active','paused','completed'] %}
          <option value="{{ s }}" {% if campaign.status==s %}selected{% endif %}>{{ s|title }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Budget (₹)</label><input type="number" name="budget" value="{{ campaign.budget }}" min="0" step="100"/></div>
      <div class="form-group"><label>Spent (₹)</label><input type="number" name="spent" value="{{ campaign.spent }}" min="0" step="100"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Impressions</label><input type="number" name="impressions" value="{{ campaign.impressions }}" min="0"/></div>
      <div class="form-group"><label>Clicks</label><input type="number" name="clicks" value="{{ campaign.clicks }}" min="0"/></div>
    </div>
    <div class="form-group"><label>Conversions</label><input type="number" name="conversions" value="{{ campaign.conversions }}" min="0"/></div>
    <div class="form-group"><label>Notes</label><textarea name="notes">{{ campaign.notes or '' }}</textarea></div>
    <div style="display:flex;gap:1rem;margin-top:.5rem;flex-wrap:wrap">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('campaigns') }}" class="btn btn-ghost">Cancel</a>
      <form method="POST" action="{{ url_for('delete_campaign', cid=campaign.id) }}" style="margin:0" onsubmit="return confirm('Delete this campaign?')">
        <button type="submit" class="btn btn-danger">Delete</button>
      </form>
    </div>
  </form>
</div>
{% endblock %}
