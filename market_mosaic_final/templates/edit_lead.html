{% extends "dash_base.html" %}
{% block title %}Edit Lead — Market Mosaic{% endblock %}
{% block dash_content %}
<div class="dash-header">
  <h1 class="dash-title">Edit Lead</h1>
  <p class="dash-sub">Update lead information and status.</p>
</div>
<div class="dash-card" style="max-width:600px">
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" value="{{ lead.name }}" required/></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ lead.email }}" required/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Company</label><input type="text" name="company" value="{{ lead.company or '' }}"/></div>
      <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ lead.phone or '' }}"/></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Source</label>
        <select name="source">
          {% for s in ['Organic','LinkedIn','Google','Referral','Email','Event','Other'] %}
          <option {% if lead.source==s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          {% for s in ['new','contacted','qualified','lost'] %}
          <option value="{{ s }}" {% if lead.status==s %}selected{% endif %}>{{ s|title }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea name="notes">{{ lead.notes or '' }}</textarea></div>
    <div style="display:flex;gap:1rem;margin-top:.5rem;flex-wrap:wrap">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('leads') }}" class="btn btn-ghost">Cancel</a>
      <form method="POST" action="{{ url_for('delete_lead', lid=lead.id) }}" style="margin:0" onsubmit="return confirm('Delete this lead?')">
        <button type="submit" class="btn btn-danger">Delete</button>
      </form>
    </div>
  </form>
</div>
{% endblock %}
