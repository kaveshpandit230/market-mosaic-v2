{% extends "dash_base.html" %}
{% block title %}New Campaign — Market Mosaic{% endblock %}
{% block dash_content %}
<div class="dash-header">
  <h1 class="dash-title">New Campaign</h1>
  <p class="dash-sub">Set up a new marketing campaign to track.</p>
</div>
<div class="dash-card" style="max-width:600px">
  <form method="POST">
    <div class="form-group"><label>Campaign Name</label><input type="text" name="name" placeholder="e.g. Q2 Brand Awareness" required/></div>
    <div class="form-row">
      <div class="form-group">
        <label>Channel</label>
        <select name="channel" required>
          <option value="">Select channel</option>
          <option>Social Media</option><option>Search</option><option>Email</option>
          <option>LinkedIn</option><option>Display</option><option>Influencer</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft">Draft</option><option value="active">Active</option><option value="paused">Paused</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Budget (Rs)</label><input type="number" name="budget" placeholder="e.g. 50000" min="0" step="100"/></div>
    <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Campaign goals, target audience, key messages..."></textarea></div>
    <div style="display:flex;gap:1rem;margin-top:.5rem">
      <button type="submit" class="btn btn-primary">Create Campaign</button>
      <a href="{{ url_for('campaigns') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
