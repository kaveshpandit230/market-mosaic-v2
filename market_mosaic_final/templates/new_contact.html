{% extends "dash_base.html" %}
{% block title %}New Contact — Market Mosaic CRM{% endblock %}
{% block dash_content %}
<div class="dash-header">
  <h1 class="dash-title">New Contact</h1>
  <p class="dash-sub">Add a new contact to your CRM.</p>
</div>
<div class="dash-card" style="max-width:640px">
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>Full Name *</label><input type="text" name="name" placeholder="Priya Sharma" required/></div>
      <div class="form-group"><label>Job Title</label><input type="text" name="title" placeholder="Marketing Manager"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="priya@company.com"/></div>
      <div class="form-group"><label>Phone</label><input type="text" name="phone" placeholder="+91 98200 00000"/></div>
    </div>
    <div class="form-group"><label>Company</label><input type="text" name="company" placeholder="Company name"/></div>
    <div class="form-row">
      <div class="form-group">
        <label>Source</label>
        <select name="source">
          <option>Organic</option><option>LinkedIn</option><option>Google</option>
          <option>Referral</option><option>Email</option><option>Event</option><option>Manual</option>
        </select>
      </div>
      <div class="form-group"><label>Tags (comma separated)</label><input type="text" name="tags" placeholder="vip, warm, enterprise"/></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Initial notes about this contact..."></textarea></div>
    <div style="display:flex;gap:1rem;margin-top:.5rem">
      <button type="submit" class="btn btn-primary">Create Contact</button>
      <a href="{{ url_for('crm_contacts') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
