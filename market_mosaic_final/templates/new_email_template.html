{% extends "dash_base.html" %}
{% block title %}New Email Template — Market Mosaic{% endblock %}
{% block content %}
<div class="dash-header">
  <h1 class="dash-title">New Email Template</h1>
  <p class="dash-sub">Use <code>{{"{{"}}name{{"}}"}}</code>, <code>{{"{{"}}campaign{{"}}"}}</code>, <code>{{"{{"}}month{{"}}"}}</code> as placeholders</p>
</div>
<div class="dash-card" style="max-width:700px">
  <form method="POST">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div style="margin-bottom:1rem">
        <label style="display:block;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:.4rem">Template Name</label>
        <input name="name" required placeholder="Monthly Report" style="width:100%;padding:.75rem 1rem;border:1px solid var(--sand);background:var(--warm);font-family:var(--font-b);font-size:.875rem;color:var(--ink);outline:none">
      </div>
      <div style="margin-bottom:1rem">
        <label style="display:block;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:.4rem">Subject Line</label>
        <input name="subject" required placeholder="Your {{"{{"}}month{{"}}"}} report is ready" style="width:100%;padding:.75rem 1rem;border:1px solid var(--sand);background:var(--warm);font-family:var(--font-b);font-size:.875rem;color:var(--ink);outline:none">
      </div>
    </div>
    <div style="margin-bottom:1.5rem">
      <label style="display:block;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:.4rem">Email Body (HTML supported)</label>
      <textarea name="body_html" rows="12" required placeholder="&lt;h2&gt;Hi {{'{{'}}name{{'}}'}}!&lt;/h2&gt;&#10;&lt;p&gt;Here is your monthly report...&lt;/p&gt;" style="width:100%;padding:.75rem 1rem;border:1px solid var(--sand);background:var(--warm);font-family:monospace;font-size:.8rem;color:var(--ink);outline:none;resize:vertical"></textarea>
    </div>
    <div style="display:flex;gap:1rem">
      <button type="submit" style="padding:.75rem 1.5rem;background:var(--ink);color:var(--cream);border:none;font-family:var(--font-b);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer">Save Template</button>
      <a href="{{ url_for('email_campaigns') }}" style="padding:.75rem 1.5rem;border:1px solid var(--sand);color:var(--ink-soft);text-decoration:none;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
