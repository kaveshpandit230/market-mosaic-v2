{% extends "dash_base.html" %}
{% block title %}Add Lead — Market Mosaic{% endblock %}
{% block dash_content %}
<div class="dash-header">
  <h1 class="dash-title">Add Lead</h1>
  <p class="dash-sub">Capture a new lead into your pipeline.</p>
</div>
<div class="dash-card" style="max-width:600px">
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="Priya Sharma" required/></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="priya@company.com" required/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Company</label><input type="text" name="company" placeholder="Company name"/></div>
      <div class="form-group"><label>Phone</label><input type="text" name="phone" placeholder="+91 98200 00000"/></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Source</label>
        <select name="source">
          <option>Organic</option><option>LinkedIn</option><option>Google</option>
          <option>Referral</option><option>Email</option><option>Event</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="new">New</option><option value="contacted">Contacted</option>
          <option value="qualified">Qualified</option><option value="lost">Lost</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Any initial notes about this lead..."></textarea></div>
    <div style="display:flex;gap:1rem;margin-top:.5rem">
      <button type="submit" class="btn btn-primary">Add Lead</button>
      <a href="{{ url_for('leads') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
