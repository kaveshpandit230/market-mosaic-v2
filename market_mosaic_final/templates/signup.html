{% extends "base.html" %}
{% block title %}Create Account — Market Mosaic{% endblock %}
{% block extra_head %}
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:7rem 1.5rem 4rem}
.auth-card{width:100%;max-width:480px;background:var(--warm);border:1px solid var(--sand);padding:3rem}
.auth-logo{font-family:var(--font-d);font-size:1.4rem;font-weight:600;color:var(--ink);text-decoration:none;display:block;margin-bottom:2rem}
.auth-logo span{color:var(--accent)}
.auth-title{font-family:var(--font-d);font-size:2rem;font-weight:300;margin-bottom:.4rem}
.auth-sub{color:var(--ink-soft);font-size:.9rem;margin-bottom:2rem}
.auth-footer{margin-top:1.5rem;font-size:.85rem;color:var(--ink-soft);text-align:center}
.auth-footer a{color:var(--accent);text-decoration:none;font-weight:500}
.submit-btn{width:100%;padding:.95rem;background:var(--ink);color:var(--cream);border:none;cursor:pointer;font-family:var(--font-b);font-size:.75rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;transition:background .2s;margin-top:.5rem}
.submit-btn:hover{background:var(--accent)}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <a class="auth-logo" href="{{ url_for('home') }}">Market Mosaic<span>.</span></a>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free to start. No credit card required.</p>
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Kavesh Shah" required/>
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" name="company" placeholder="Your Company" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@company.com" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min. 8 characters" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm" placeholder="Repeat password" required/>
        </div>
      </div>
      <button type="submit" class="submit-btn">Create Account →</button>
    </form>
    <div style="margin-top:1.2rem;text-align:center">
      <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1rem">
        <div style="flex:1;height:1px;background:var(--sand)"></div>
        <span style="font-size:.75rem;color:var(--stone);letter-spacing:.06em">or</span>
        <div style="flex:1;height:1px;background:var(--sand)"></div>
      </div>
      <a href="{{ url_for('google_login') }}" style="display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;padding:.85rem;border:1px solid var(--sand);background:var(--cream);color:var(--ink);text-decoration:none;font-size:.82rem;font-weight:500;transition:border-color .2s;letter-spacing:.03em" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--sand)'">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign up with Google
      </a>
    </div>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
  </div>
</div>
{% endblock %}
